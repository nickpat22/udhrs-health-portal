<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UDHRS Health Portal</title>
    <script>
      // Error overlay: only shown when an uncaught error or unhandled rejection occurs.
      (function () {
        function showOverlay(msg) {
          try {
            if (document.getElementById('__error_overlay')) return;
            var d = document.createElement('div');
            d.id = '__error_overlay';
            d.style.position = 'fixed';
            d.style.left = '12px';
            d.style.right = '12px';
            d.style.top = '12px';
            d.style.zIndex = 999999;
            d.style.background = 'rgba(255,16,16,0.95)';
            d.style.color = 'white';
            d.style.padding = '12px 16px';
            d.style.borderRadius = '8px';
            d.style.fontFamily = 'system-ui, Arial, sans-serif';
            d.style.boxShadow = '0 6px 30px rgba(0,0,0,0.3)';
            d.style.maxHeight = '60vh';
            d.style.overflow = 'auto';
            d.style.whiteSpace = 'pre-wrap';
            d.textContent = msg;
            document.addEventListener('click', function () {
              var el = document.getElementById('__error_overlay');
              if (el) el.style.display = 'none';
            });
            document.body.appendChild(d);
          } catch (e) {
            /* ignore */
          }
        }

        window.addEventListener('error', function (ev) {
          var m = ev && ev.error && ev.error.stack ? ev.error.stack : (ev && ev.message) || String(ev);
          showOverlay('Uncaught error:\n' + m);
        });

        window.addEventListener('unhandledrejection', function (ev) {
          var reason = ev && ev.reason ? (ev.reason.stack || ev.reason) : ev;
          showOverlay('Unhandled promise rejection:\n' + String(reason));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <main style="font-family: system-ui, sans-serif; min-height:100vh; display:grid; place-items:center; padding:2rem; text-align:center; background:#f5f7fb;">
        <div style="max-width:560px; width:100%; padding:24px; background:white; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.08);">
          <h1 style="margin-bottom:16px;">UDHRS Health Portal</h1>
          <p style="margin-bottom:12px;">Static fallback: If the page remains blank, JavaScript may be blocked or failed to run.</p>
          <code style="display:block; word-break:break-all; color:#555;">Supabase URL: https://hgfvfcfabjopphmzicyf.supabase.co</code>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Diagnostic badge: appears only when #root is still empty after load
      (function(){
        function showBadge(msg){
          try{
            var b = document.getElementById('__diagnostic_badge');
            if(b) return; 
            b = document.createElement('div');
            b.id = '__diagnostic_badge';
            b.textContent = msg;
            b.style.position = 'fixed';
            b.style.right = '12px';
            b.style.bottom = '12px';
            b.style.background = 'rgba(255,190,0,0.95)';
            b.style.color = '#111';
            b.style.padding = '6px 10px';
            b.style.borderRadius = '8px';
            b.style.fontFamily = 'system-ui, Arial, sans-serif';
            b.style.zIndex = 999999;
            b.style.cursor = 'pointer';
            b.onclick = function(){ b.style.display='none'; };
            document.body.appendChild(b);
          }catch(e){}
        }
        window.addEventListener('load', function(){
          setTimeout(function(){
            try{
              var root = document.getElementById('root');
              if(!root || (root && root.children.length === 0 && (root.textContent||'').trim()==='')){
                showBadge('Diagnostic: root empty');
              }
            }catch(e){ showBadge('Diagnostic: error checking root'); }
          },1500);
        });
      })();
    </script>
  </body>
</html>
